<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escape Escuela Definitivo</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  text-align:center;
}

#game {
  padding:20px;
}

button {
  padding:12px;
  margin:6px;
  font-size:16px;
  border-radius:10px;
  cursor:pointer;
}

img {
  width:80%;
  max-width:700px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="game"></div>

<script>

let vida = 100;
let inventario = [];

function render(html){
  document.getElementById("game").innerHTML = html;
}

function estado(){
  return `
  <p>❤️ Vida: ${vida}</p>
  <p>🎒 Inventario: ${inventario.join(", ") || "Vacío"}</p>
  `;
}

function start(){
  vida = 100;
  inventario = [];

  render(`
    <h1>🏫 ESCAPE DE LA ESCUELA 🧟</h1>
    <img src="https://i.imgur.com/3ZQ3ZQm.jpg">

    <p>Una escuela abandonada llena de zombis...</p>

    <button onclick="aula()">Jugar</button>
  `);
}

function aula(){
  render(`
    ${estado()}

    <h2>Te despiertas en un aula destruida</h2>

    <img src="https://i.imgur.com/7n5gH2A.jpg">

    <button onclick="buscar()">Buscar</button>
    <button onclick="pasillo()">Salir</button>
  `);
}

function buscar(){
  if(!inventario.includes("Linterna")){
    inventario.push("Linterna");
    alert("🔦 Linterna encontrada");
  }
  pasillo();
}

function pasillo(){

  let zombie = Math.random() < 0.7;

  if(zombie){
    render(`
      ${estado()}

      <h2>🧟 Zombi aparece</h2>

      <img src="https://i.imgur.com/2yaf2wb.jpg">

      <button onclick="atacar()">Atacar</button>
      <button onclick="huir()">Huir</button>
    `);
  } else {
    piso2();
  }
}

function atacar(){
  let win = Math.random() < (inventario.includes("Linterna") ? 0.75 : 0.5);

  if(win){
    piso2();
  } else {
    vida -= 40;
    check();
    piso2();
  }
}

function huir(){
  vida -= 10;
  check();
  piso2();
}

function piso2(){
  render(`
    ${estado()}

    <h2>Segundo piso</h2>

    <img src="https://i.imgur.com/6Xg5x5A.jpg">

    <button onclick="lab()">Laboratorio</button>
    <button onclick="lib()">Biblioteca</button>
    <button onclick="botiquin()">Botiquín</button>
    <button onclick="final()">Terraza</button>
  `);
}

function lab(){
  if(Math.random() < 0.6){
    if(!inventario.includes("Llave")){
      inventario.push("Llave");
      alert("🔑 Llave encontrada");
    }
  } else {
    vida -= 20;
  }
  check();
  piso2();
}

function lib(){
  alert("📖 Necesitas la llave para escapar");
  piso2();
}

function botiquin(){
  vida = Math.min(100, vida + 40);
  alert("❤️ Te curaste");
  piso2();
}

function final(){

  if(inventario.includes("Llave") && vida > 60){
    render(`
      <h1>🏆 FINAL BUENO</h1>
      <img src="https://i.imgur.com/1Q9Z1ZJ.jpg">
      <p>🚁 El helicóptero te rescata</p>

      <button onclick="start()">Jugar otra vez</button>
    `);
  }

  else if(inventario.includes("Llave")){
    render(`
      <h1>🏃 FINAL NORMAL</h1>
      <p>Escapaste solo</p>

      <button onclick="start()">Reintentar</button>
    `);
  }

  else {
    render(`
      <h1>💀 GAME OVER</h1>
      <p>No lograste escapar</p>

      <button onclick="start()">Reintentar</button>
    `);
  }
}

function check(){
  if(vida <= 0){
    render(`
      <h1>💀 GAME OVER</h1>
      <button onclick="start()">Reintentar</button>
    `);
  }
}

start();

</script>

</body>
</html>
